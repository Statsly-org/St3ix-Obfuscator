# St3ix Obfuscator config (rename to config.yml, place next to JAR)

# Enable or disable class renaming
classRenamingEnabled: true

# Obfuscate numeric constants (int/long) using XOR
numberObfuscationEnabled: true

# Obfuscate array dimensions (new Type[n] -> n hidden with XOR)
arrayObfuscationEnabled: true

# Class name generation
classNamesRandom: true  # true = random names per build, false = sequential (a, b, c...)
classNameLength: 6       # minimum length of class names (1-32). Longer = harder to read.

# Obfuscation keys (XOR)
numberKeyRandom: true   # true = random key per build, false = fixed key
arrayKeyRandom: false   # true = random key per build, false = fixed key

# Classes/packages to exclude from renaming.
# Use dot or slash notation. Prefix matches (org.bukkit excludes org.bukkit.*)
# Built-in excludes: java.*, javax.*, org.bukkit.*, net.minecraft.*, org.spigotmc.*, etc.
excludeClasses:
  - com.myapp.sensitive
  - org.example.api
